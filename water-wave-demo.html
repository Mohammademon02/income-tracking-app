<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Wave Animation Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .demo-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }

        /* Card Styles */
        .account-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .account-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15);
        }

        .account-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .account-info h3 {
            font-size: 20px;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .withdrawal-ready {
            background: rgba(34, 197, 94, 0.1);
            color: #059669;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .points-display {
            text-align: right;
            position: relative;
            z-index: 10;
        }

        .points-number {
            font-size: 36px;
            font-weight: bold;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .points-label {
            font-size: 14px;
            color: #718096;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
            margin: 16px 0;
            position: relative;
            z-index: 10;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 4px;
            animation: progress-fill 2s ease-out forwards;
        }

        /* 🌊 REALISTIC 3D WATER WAVE ANIMATION */

        /* Advanced 3D Wave Keyframes */
        @keyframes realistic-water-rise {
            0% {
                transform: translateY(100%) scaleY(0.8);
                opacity: 0;
            }
            30% {
                transform: translateY(70%) scaleY(0.9);
                opacity: 0.4;
            }
            70% {
                transform: translateY(20%) scaleY(1.05);
                opacity: 0.8;
            }
            100% {
                transform: translateY(0%) scaleY(1);
                opacity: 1;
            }
        }

        @keyframes ocean-wave-3d {
            0% {
                transform: translateX(-100%) translateY(0px) rotateY(0deg) scaleX(1);
            }
            25% {
                transform: translateX(-50%) translateY(-3px) rotateY(2deg) scaleX(1.1);
            }
            50% {
                transform: translateX(0%) translateY(-5px) rotateY(0deg) scaleX(1);
            }
            75% {
                transform: translateX(50%) translateY(-3px) rotateY(-2deg) scaleX(1.1);
            }
            100% {
                transform: translateX(100%) translateY(0px) rotateY(0deg) scaleX(1);
            }
        }

        @keyframes wave-surface-ripple {
            0% {
                transform: translateX(-100%) translateY(0px) scaleY(1);
                opacity: 0.6;
            }
            20% {
                transform: translateX(-60%) translateY(-2px) scaleY(1.2);
                opacity: 0.8;
            }
            40% {
                transform: translateX(-20%) translateY(-4px) scaleY(0.8);
                opacity: 1;
            }
            60% {
                transform: translateX(20%) translateY(-3px) scaleY(1.1);
                opacity: 0.9;
            }
            80% {
                transform: translateX(60%) translateY(-1px) scaleY(0.9);
                opacity: 0.7;
            }
            100% {
                transform: translateX(100%) translateY(0px) scaleY(1);
                opacity: 0.5;
            }
        }

        @keyframes floating-bubble {
            0%, 100% {
                transform: translateY(0px) translateX(0px) scale(1);
                opacity: 0.4;
            }
            25% {
                transform: translateY(-15px) translateX(8px) scale(1.2);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-25px) translateX(-5px) scale(0.8);
                opacity: 0.9;
            }
            75% {
                transform: translateY(-18px) translateX(12px) scale(1.1);
                opacity: 0.6;
            }
        }

        @keyframes water-shimmer {
            0%, 100% {
                background-position: -200% 0;
                opacity: 0.3;
            }
            50% {
                background-position: 200% 0;
                opacity: 0.7;
            }
        }

        @keyframes progress-fill {
            0% {
                width: 0%;
            }
            100% {
                width: var(--progress-width);
            }
        }

        /* 3D Water Wave Container */
        .water-wave-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65%;
            overflow: hidden;
            border-radius: 0 0 16px 16px;
            z-index: 1;
            transform-style: preserve-3d;
            perspective: 1000px;
            opacity: 0;
            animation: fade-in 0.6s ease-out 0.2s forwards;
        }

        @keyframes fade-in {
            to { opacity: 1; }
        }

        /* Realistic Water Base with Natural Green Tones */
        .water-base {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: linear-gradient(180deg, 
                rgba(16, 185, 129, 0.08) 0%,     /* Light emerald */
                rgba(5, 150, 105, 0.15) 30%,     /* Medium emerald */
                rgba(4, 120, 87, 0.25) 70%,      /* Deeper emerald */
                rgba(6, 95, 70, 0.35) 100%       /* Deep teal */
            );
            animation: realistic-water-rise 2.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            box-shadow: 
                inset 0 10px 20px rgba(16, 185, 129, 0.1),
                inset 0 -10px 20px rgba(6, 95, 70, 0.2);
        }

        /* Water Shimmer Effect */
        .water-base::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(52, 211, 153, 0.3) 25%,
                rgba(110, 231, 183, 0.5) 50%,
                rgba(52, 211, 153, 0.3) 75%,
                transparent 100%
            );
            background-size: 200% 100%;
            animation: water-shimmer 4s ease-in-out infinite;
        }

        /* 3D Ocean Wave Layers */
        .ocean-wave-3d {
            position: absolute;
            top: -15px;
            left: -60%;
            width: 220%;
            height: 30px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(34, 197, 94, 0.2) 15%,
                rgba(16, 185, 129, 0.4) 30%,
                rgba(5, 150, 105, 0.6) 50%,
                rgba(16, 185, 129, 0.4) 70%,
                rgba(34, 197, 94, 0.2) 85%,
                transparent 100%
            );
            border-radius: 50%;
            animation: ocean-wave-3d 5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
            transform-style: preserve-3d;
            box-shadow: 
                0 5px 15px rgba(16, 185, 129, 0.2),
                inset 0 2px 4px rgba(110, 231, 183, 0.3);
        }

        .ocean-wave-3d:nth-child(2) {
            animation-delay: -1.7s;
            opacity: 0.8;
            height: 25px;
            top: -8px;
            animation-duration: 4.2s;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(52, 211, 153, 0.25) 20%,
                rgba(34, 197, 94, 0.45) 50%,
                rgba(52, 211, 153, 0.25) 80%,
                transparent 100%
            );
        }

        .ocean-wave-3d:nth-child(3) {
            animation-delay: -3.4s;
            opacity: 0.6;
            height: 20px;
            top: -3px;
            animation-duration: 6s;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(110, 231, 183, 0.2) 25%,
                rgba(52, 211, 153, 0.35) 50%,
                rgba(110, 231, 183, 0.2) 75%,
                transparent 100%
            );
        }

        /* Surface Ripple Effects */
        .wave-surface-ripple {
            position: absolute;
            top: -8px;
            left: -40%;
            width: 180%;
            height: 16px;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(110, 231, 183, 0.4) 30%,
                rgba(167, 243, 208, 0.6) 50%,
                rgba(110, 231, 183, 0.4) 70%,
                transparent 100%
            );
            border-radius: 50%;
            animation: wave-surface-ripple 3.5s ease-in-out infinite;
            filter: blur(0.5px);
        }

        .wave-surface-ripple:nth-child(5) {
            animation-delay: -1.2s;
            opacity: 0.7;
            height: 12px;
            top: -4px;
            animation-duration: 4s;
        }

        .wave-surface-ripple:nth-child(6) {
            animation-delay: -2.4s;
            opacity: 0.5;
            height: 10px;
            top: -1px;
            animation-duration: 4.8s;
        }

        /* Floating Bubbles and Particles */
        .floating-bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, 
                rgba(167, 243, 208, 0.8) 0%,
                rgba(110, 231, 183, 0.6) 40%,
                rgba(52, 211, 153, 0.4) 100%
            );
            animation: floating-bubble 6s ease-in-out infinite;
            box-shadow: 
                0 2px 8px rgba(16, 185, 129, 0.3),
                inset 1px 1px 2px rgba(255, 255, 255, 0.4);
        }

        .bubble-1 {
            top: 25%;
            left: 20%;
            width: 6px;
            height: 6px;
            animation-delay: 0s;
            animation-duration: 5s;
        }

        .bubble-2 {
            top: 40%;
            right: 25%;
            width: 4px;
            height: 4px;
            animation-delay: 1.8s;
            animation-duration: 6.5s;
        }

        .bubble-3 {
            top: 30%;
            left: 60%;
            width: 5px;
            height: 5px;
            animation-delay: 3.2s;
            animation-duration: 5.8s;
        }

        .bubble-4 {
            top: 50%;
            left: 35%;
            width: 3px;
            height: 3px;
            animation-delay: 4.5s;
            animation-duration: 7s;
        }

        /* Enhanced Water Glow Effect */
        .water-glow {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at center top,
                rgba(52, 211, 153, 0.15) 0%,
                rgba(16, 185, 129, 0.08) 50%,
                transparent 100%
            );
            animation: water-shimmer 3s ease-in-out infinite alternate;
        }

        /* Demo Controls */
        .demo-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
        }

        .toggle-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.3s ease;
        }

        .toggle-btn:hover {
            background: #5a67d8;
        }

        .demo-title {
            text-align: center;
            color: white;
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 40px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="demo-title">💧 Water Wave Animation Demo</div>
    
    <div class="demo-controls">
        <button class="toggle-btn" onclick="toggleWaves()">Toggle Water Effect</button>
    </div>

    <div class="demo-container">
        <!-- Card 1: Withdrawal Ready with Enhanced 3D Water Effect -->
        <div class="account-card" id="card1">
            <div class="water-wave-container" id="waves1">
                <div class="water-base">
                    <div class="water-glow"></div>
                </div>
                <div class="ocean-wave-3d"></div>
                <div class="ocean-wave-3d"></div>
                <div class="ocean-wave-3d"></div>
                <div class="wave-surface-ripple"></div>
                <div class="wave-surface-ripple"></div>
                <div class="wave-surface-ripple"></div>
                <div class="floating-bubble bubble-1"></div>
                <div class="floating-bubble bubble-2"></div>
                <div class="floating-bubble bubble-3"></div>
                <div class="floating-bubble bubble-4"></div>
            </div>
            
            <div class="account-header">
                <div class="avatar">A</div>
                <div class="account-info">
                    <h3>Anthony Porter</h3>
                    <div class="status-badge withdrawal-ready">
                        <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1s infinite;"></div>
                        Withdrawal Ready
                    </div>
                </div>
                <div class="points-display">
                    <div class="points-number">1,662</div>
                    <div class="points-label">pts</div>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" style="--progress-width: 85%;"></div>
            </div>
        </div>

        <!-- Card 2: Regular Account -->
        <div class="account-card">
            <div class="account-header">
                <div class="avatar" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">J</div>
                <div class="account-info">
                    <h3>Jason Cole</h3>
                    <div class="status-badge" style="background: rgba(59, 130, 246, 0.1); color: #2563eb; border: 1px solid rgba(59, 130, 246, 0.2);">
                        <div style="width: 6px; height: 6px; background: #3b82f6; border-radius: 50%;"></div>
                        Active
                    </div>
                </div>
                <div class="points-display">
                    <div class="points-number">533</div>
                    <div class="points-label">pts</div>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" style="--progress-width: 45%; background: linear-gradient(90deg, #3b82f6, #1d4ed8);"></div>
            </div>
        </div>

        <!-- Card 3: Another Withdrawal Ready with Enhanced 3D Water Effect -->
        <div class="account-card" id="card3">
            <div class="water-wave-container" id="waves3">
                <div class="water-base">
                    <div class="water-glow"></div>
                </div>
                <div class="ocean-wave-3d"></div>
                <div class="ocean-wave-3d"></div>
                <div class="ocean-wave-3d"></div>
                <div class="wave-surface-ripple"></div>
                <div class="wave-surface-ripple"></div>
                <div class="wave-surface-ripple"></div>
                <div class="floating-bubble bubble-1"></div>
                <div class="floating-bubble bubble-2"></div>
                <div class="floating-bubble bubble-3"></div>
                <div class="floating-bubble bubble-4"></div>
            </div>
            
            <div class="account-header">
                <div class="avatar" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">J</div>
                <div class="account-info">
                    <h3>Jordan Coleman</h3>
                    <div class="status-badge withdrawal-ready">
                        <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1s infinite;"></div>
                        Withdrawal Ready
                    </div>
                </div>
                <div class="points-display">
                    <div class="points-number">1,587</div>
                    <div class="points-label">pts</div>
                </div>
            </div>
            
            <div class="progress-bar">
                <div class="progress-fill" style="--progress-width: 92%;"></div>
            </div>
        </div>
    </div>

    <style>
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }
    </style>

    <script>
        let wavesEnabled = true;

        function toggleWaves() {
            wavesEnabled = !wavesEnabled;
            const waveContainers = document.querySelectorAll('.water-wave-container');
            
            waveContainers.forEach(container => {
                if (wavesEnabled) {
                    container.style.display = 'block';
                    // Restart animations
                    container.style.animation = 'none';
                    container.offsetHeight; // Trigger reflow
                    container.style.animation = 'fade-in 0.5s ease-out forwards';
                } else {
                    container.style.display = 'none';
                }
            });
            
            document.querySelector('.toggle-btn').textContent = 
                wavesEnabled ? 'Disable Water Effect' : 'Enable Water Effect';
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Add some interactive hover effects
            document.querySelectorAll('.account-card').forEach(card => {
                card.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-8px) scale(1.02)';
                });
                
                card.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0) scale(1)';
                });
            });
        });
    </script>
</body>
</html>
